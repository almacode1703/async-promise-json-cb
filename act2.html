<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CallBack Function</title>
    <style>
        .form-display{
            background-color: lightgreen;
            border: 2px solid;
            padding: 1rem 1.2rem;
            max-width: fit-content;
            margin: 0 auto;
        }
        .display{
            background-color: lightblue;
            border: 2px solid;
            padding: 1rem 1.2rem;
            width: 30%;
            margin: 0 auto;
        }
    </style>
</head>
<body>

      <form action="" onsubmit="addNums(event)" class="form-display">
        <h1>Enter two numbers</h1>
         <input type="number" name="" id="num1"><br><br>
         <input type="number" name="" id="num2"><br><br>
         <button>Submit</button>
      </form>
 

     <p id="demo"></p>

     <script>

        function callBackDisplayer(value){
            document.getElementById("demo").innerHTML = value;
            document.getElementById("demo").classList.add("display");
        }

        function calculateSum(input1, input2, callBack){
            input1 = Number(input1);
            input2 = Number(input2);
            let sum = input1 + input2;
            callBack(sum);
        }

        function addNums(event){
            event.preventDefault();
            let num1 = document.getElementById("num1").value;
            let num2 = document.getElementById("num2").value;
            calculateSum(num1, num2, callBackDisplayer);
        }

     </script>
    
</body>
</html>
